<div class="container py-5 page-shell agente-dashboard dashboard-shell">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-12">
      <div class="card shadow-sm table-card dashboard-card">
        <div class="card-body">
          <div class="table-responsive table-wrap">
            <table #dTable class="table table-striped table-hover table-sm align-middle mb-0 table-modern agent-table">
              <thead class="table-light table-modern-head agent-table-head">
                <tr>
                  <th class="col-id">#</th>
                  <th class="col-procesado">Procesado</th>
                  <th class="col-cuenta">Cuenta</th>
                  <th class="col-farmacia">Farmacia</th>
                  <th class="col-fecha">Fecha</th>
                  <th class="col-acciones">Acciones</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let item of datoscuenta">
                  <td class="cell-id">{{ item.uiRow }}</td>
                  <td class="text-center status-cell cell-procesado" (click)="$event.stopPropagation()">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      [checked]="item.bProcesado"
                      (change)="onProcesadoChange(item, $any($event.target).checked)"
                      aria-label="Procesado"
                      readonly
                    />
                  </td>
                  <td class="cell-cuenta">{{ item.sCuentaOracle }}</td>
                  <td class="cell-farmacia">{{ item.sNombreCorto }}</td>
                  <td class="cell-fecha">{{ item.dtModificacion }}</td>
                  <td class="cell-acciones" style="cursor: pointer;">
                    <i
                      class="bi bi-pencil-fill me-3 action-icon edit-icon"
                      title="Editar"
                      (click)="goToDetalle(item.uiRow)"
                    ></i>
                    <i
                      class="bi bi-file-earmark-text-fill action-icon estado-icon"
                      title="Estado de cuenta"
                      (click)="goToEstadoCuenta(item.sCuentaOracle)"
                    ></i>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
