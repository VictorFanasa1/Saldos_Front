<section class="medical-hero min-vh-100 py-4">
  <div class="container page-shell incidencias-shell">
    <div class="page-header">
      <div>
        <p class="page-kicker">Administracion</p>
        <h1 class="page-title">Cuentas sin incidencias</h1>
        <p class="page-subtitle">
          Revision de cuentas cerradas sin incidencias registradas.
        </p>
      </div>
    </div>

    <div class="card shadow-sm table-card incidencias-card">
      <div class="card-body">
        <div class="table-responsive table-wrap">
          <table
            #dTable
            id="cuentasTable"
            class="table table-striped table-hover table-sm align-middle mb-0 table-modern incidencias-table">
            <thead class="table-light table-modern-head incidencias-table-head">
              <tr>
                <th class="col-id">#</th>
                <th class="col-procesado">Procesado</th>
                <th class="col-cuenta">Cuenta</th>
                <th class="col-farmacia">Farmacia</th>
                <th class="col-estatus">Estatus</th>
                <th class="col-fecha">Fecha</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of datoscuentaS">
                <td class="cell-id clickable-cell" (click)="goToDetalle(item.pp_uiRow, 0)">
                  {{ item.uiRow }}
                </td>
                <td class="text-center status-cell cell-procesado" (click)="$event.stopPropagation()">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    [checked]="item.procesado"
                    (change)="onProcesadoChange(item, $any($event.target).checked)"
                    aria-label="Procesado"
                    readonly
                  />
                </td>
                <td class="cell-cuenta">{{ item.cuenta_oracle }}</td>
                <td class="cell-farmacia">{{ item.nombre_corto }}</td>
                <td class="cell-estatus">
                  <span class="status-badge status-cerrado">Cerrado</span>
                </td>
                <td class="cell-fecha">{{ item.created_at }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</section>
