<nav class="topbar navbar-app sticky-top" *ngIf="showHeader$ | async">
  <div class="container-fluid topbar-shell">
    <div class="topbar-left">
      <button
        class="btn btn-icon d-lg-none"
        type="button"
        aria-label="Abrir menu"
        (click)="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>

      <a class="brand-lockup" routerLink="/">
        <span class="brand-copy">
          <strong>AudiFarma</strong>
          <small>Panel operativo</small>
        </span>
      </a>
    </div>

    <div class="topbar-right">
      <div class="user-card d-none d-lg-flex">
        <div class="avatar-sm">{{ alias }}</div>
        <div class="user-meta">
          <span class="user-name">{{ nombreuser }}</span>
          <small>{{ tipousuario }}</small>
        </div>
      </div>

      <div class="dropdown">
        <button
          class="btn topbar-role-btn dropdown-toggle"
          data-bs-toggle="dropdown"
          aria-expanded="false">
          <span class="role-pill">{{ rol }}</span>
          <i class="bi bi-chevron-down"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-end topbar-menu">
          <li class="dropdown-header topbar-menu__header">Navegacion</li>

          <li *ngIf="showAdmin$ | async">
            <a
              class="dropdown-item topbar-menu__item"
              routerLink="/admin/agente"
              routerLinkActive="topbar-menu__item--active"
              (click)="closeMenu()">
              <i class="bi bi-person-badge"></i>
              <span>Cuentas del representante</span>
            </a>
          </li>
          <li *ngIf="showAdmin$ | async">
            <a
              class="dropdown-item topbar-menu__item"
              routerLink="/admin/clientes"
              routerLinkActive="topbar-menu__item--active"
              (click)="closeMenu()">
              <i class="bi bi-people"></i>
              <span>Clientes</span>
            </a>
          </li>
          <li *ngIf="showAdmin$ | async">
            <a
              class="dropdown-item topbar-menu__item"
              routerLink="/admin/incidencias"
              routerLinkActive="topbar-menu__item--active"
              (click)="closeMenu()">
              <i class="bi bi-clipboard-check"></i>
              <span>Cuentas sin incidencias</span>
            </a>
          </li>
          <li *ngIf="showAdmin$ | async">
            <a
              class="dropdown-item topbar-menu__item"
              routerLink="/admin/conincidencias"
              routerLinkActive="topbar-menu__item--active"
              (click)="closeMenu()">
              <i class="bi bi-exclamation-diamond"></i>
              <span>Cuentas con incidencias</span>
            </a>
          </li>

          <li *ngIf="showAdminDown$ | async">
            <a
              class="dropdown-item topbar-menu__item"
              routerLink="/admin/incidencias"
              routerLinkActive="topbar-menu__item--active"
              (click)="closeMenu()">
              <i class="bi bi-clipboard-check"></i>
              <span>Cuentas sin incidencias</span>
            </a>
          </li>
          <li *ngIf="showAdminDown$ | async">
            <a
              class="dropdown-item topbar-menu__item"
              routerLink="/admin/conincidencias"
              routerLinkActive="topbar-menu__item--active"
              (click)="closeMenu()">
              <i class="bi bi-exclamation-diamond"></i>
              <span>Cuentas con incidencias</span>
            </a>
          </li>

          <li *ngIf="showRepresentante$ | async">
            <a
              class="dropdown-item topbar-menu__item"
              routerLink="/agente"
              routerLinkActive="topbar-menu__item--active"
              [routerLinkActiveOptions]="{ exact: true }"
              (click)="closeMenu()">
              <i class="bi bi-briefcase"></i>
              <span>Cuentas del representante</span>
            </a>
          </li>

          <li><hr class="dropdown-divider topbar-menu__divider" /></li>
          <li>
            <button class="dropdown-item topbar-menu__item topbar-menu__item--danger" (click)="logoutSys()">
              <i class="bi bi-box-arrow-right"></i>
              <span>Cerrar sesion</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>
