
<section class="medical-hero min-vh-100 d-flex align-items-center" *ngIf="verdasboard">
  <div class="container page-shell py-5">
    <!-- input oculto -->
    <input
      #fileInput
      type="file"
      accept=".xlsx,.xls,.csv"
      (change)="onFileSelected($event)"
      hidden
    />

    <div class="bento-grid">
      <!-- Tile: Carga de Excel -->

      <div class="bento-item item--upload card-glass card-upload" *ngIf="showfirstcard">
        <div class="item-inner">
          <div class="item-copy">
            <div class="item-icon">
              <i class="bi bi-file-earmark-spreadsheet"></i>
            </div>
            <h3 class="item-title">Carga de información</h3>
            <p class="item-sub">
              Sube tu archivo Excel/CSV y cargaremos la información de las cuentas.
            </p>

            <div class="d-flex flex-wrap gap-3 actions-row">
              <button class="btn btn-medical-primary btn-secondary-modern" type="button" (click)="openPicker()">
                <i class="bi bi-cloud-upload"></i> Cargar Excel
              </button>
              <button class="btn btn-medical-success btn-primary-modern"
                      type="button"
                      [disabled]="!previewRows.length || uploading"
                      (click)="subir()">
                <i class="bi bi-send-check"></i>
                {{ uploading ? (' Subiendo... ' + progress + '%') : 'Enviar al servicio' }}
              </button>

            </div>

            <div class="mt-3 small text-muted" *ngIf="previewRows?.length">
              <i class="bi bi-check2-circle"></i>
              Registros listos: <strong>{{ previewRows.length }}</strong>
            </div>

            <div class="progress mt-2" *ngIf="uploading">
              <div class="progress-bar progress-bar-striped progress-bar-animated"
                   role="progressbar"
                   [style.width.%]="progress"
                   aria-valuemin="0" aria-valuemax="100"></div>
            </div>
          </div>


        </div>

      </div>

      <!-- Tile: Configuración -->




    </div> <!-- /bento-grid -->
  </div>
</section>
